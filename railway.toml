[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && cd apps/backend && pnpm exec prisma generate --schema=prisma/schema.production.prisma && pnpm build"

[deploy]
startCommand = "cd apps/backend && npx prisma db push --schema=prisma/schema.production.prisma --skip-generate && node dist/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 30
