name: Desktop Release

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "packages/ui/**"
      - "packages/api-client/**"
      - "packages/shared-types/**"
      - ".github/workflows/desktop-release.yml"
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --filter "@vyapar/desktop..." --frozen-lockfile

      # Auto-triggered runs never commit a version bump back to the repo (that would
      # re-trigger this same workflow on push). Instead the build number comes from the
      # ever-increasing workflow run number, appended onto the human-controlled major.minor
      # already in package.json — e.g. 0.1.<run_number>.
      - name: Compute auto-incrementing version
        working-directory: apps/desktop
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const parts = pkg.version.split('.');
            pkg.version = parts[0] + '.' + parts[1] + '.${{ github.run_number }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Building version ' + pkg.version);
          "

      - name: Build renderer + electron
        working-directory: apps/desktop
        env:
          VITE_API_URL: https://vyapar-backend-production.up.railway.app/api
        run: |
          pnpm exec tsc -b
          pnpm exec vite build

      - name: Verify production API URL is baked into the build
        working-directory: apps/desktop
        shell: bash
        run: |
          if ! grep -rq "vyapar-backend-production" dist/assets/*.js; then
            echo "::error::Built bundle does not contain the production API URL — VITE_API_URL was not set correctly at build time. Refusing to publish a build that would point clients at localhost."
            exit 1
          fi
          echo "Verified: production API URL is present in the built bundle."

      - name: Package and publish Windows installer
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --publish always
