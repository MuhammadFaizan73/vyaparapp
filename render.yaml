services:
  - type: web
    name: vyapar-backend
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && cd apps/backend && pnpm prisma generate && pnpm build
    startCommand: cd apps/backend && npx prisma db push --skip-generate && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vyapar-db
          property: connectionString

databases:
  - name: vyapar-db
    plan: free
